<!-- Dark Mode Toggle Script -->
<script>
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDarkMode = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDarkMode ? 'enabled' : 'disabled');
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Check if the user has a preference stored in localStorage
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
        } else if (localStorage.getItem('darkMode') === 'disabled') {
            document.body.classList.remove('dark-mode');
        } else {
            // If no preference in localStorage, check the system's theme
            const prefersDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (prefersDarkMode) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        }

        const button = document.getElementById('darkModeButton');
        button.innerHTML = document.body.classList.contains('dark-mode')
            ? '<i class="fa fa-sun-o"></i>'
            : '<i class="fa fa-moon-o"></i>';

        button.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            button.innerHTML = isDarkMode 
                ? '<i class="fa fa-sun-o"></i>' 
                : '<i class="fa fa-moon-o"></i>';

            localStorage.setItem('darkMode', isDarkMode ? 'enabled' : 'disabled');
        });

        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (localStorage.getItem('darkMode') === null) {
                const prefersDarkMode = e.matches;
                if (prefersDarkMode) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }
        });
    });
</script>
